name = "orchid-relay"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
# Enables the workers.dev subdomain so `wrangler versions upload
# --preview-alias <name>` lands at <name>-orchid-relay.<sub>.workers.dev.
# Production traffic still flows through the custom_domain + wildcard
# routes below; this just unlocks preview URLs for PRs.
workers_dev = true

routes = [
  { pattern = "orchid.littledivy.com", custom_domain = true },
  # Wildcard route — needs a proxied DNS record for the wildcard hostname
  # (CF won't auto-create one for routes the way it does for custom_domain).
  # Add an AAAA record `*.orchid.littledivy.com` → `100::` (orange-cloud).
  { pattern = "*.orchid.littledivy.com/*", zone_id = "df74ee675cc918596a3b41da42ed0efb" },
]

[assets]
directory = "./public"
binding = "ASSETS"
html_handling = "none"
# Only the routes that require app logic invoke the Worker first; every
# other path is served straight from CF's asset edge (no Worker request,
# no CPU). The apex "/" must stay on this list — without it the dashboard
# SPA's index.html shadows app.get('/') and the marketing landing breaks.
# Subdomain auth still works because dashboard data lives behind /api/*,
# which is in the list — public /_a/* bundles are safe to serve direct.
run_worker_first = [
  "/",
  "/login",
  "/oauth/*",
  "/dashboard",
  "/logout",
  "/healthz",
  "/agent",
  "/api/*",
  "/captures/*",
  "/docs",
  "/docs/*",
]

[[durable_objects.bindings]]
name = "USER"
class_name = "UserSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserSession"]

[[kv_namespaces]]
binding = "OAUTH"
id = "19387da751724796a8b3852f21aae79c"

# Secrets set via `wrangler secret put`:
#   GH_CLIENT_ID
#   GH_CLIENT_SECRET
#   SESSION_KEY      # signs session cookies
#
# Plain vars:
[vars]
ROOT_DOMAIN = "orchid.littledivy.com"
