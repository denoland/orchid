# XcodeGen spec for the production build of Orchid Capture iOS, including
# both the main app target and the Share Extension target. The .swiftpm
# format under OrchidCaptureSources/ only supports a single target, so
# this file is the canonical path to building the full app + extension
# package.
#
# Install xcodegen with `brew install xcodegen`, then:
#
#     cd capture/ios
#     xcodegen generate
#     open OrchidCapture.xcodeproj
#
# Then either run the OrchidCapture scheme (main app on Simulator/device)
# or the OrchidCaptureShareExtension scheme (launches a host app like
# Safari to test the share sheet flow).
#
# Bundle identifiers and the team identifier need adjusting for your dev
# account before signing. The free Personal Team works for Simulator.

name: OrchidCapture
options:
  bundleIdPrefix: land.deno.orchid.capture
  deploymentTarget:
    iOS: 16.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "V83ZRZT2HR"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:
  OrchidCapture:
    type: application
    platform: iOS
    sources:
      - path: OrchidCaptureSources
        excludes:
          - Package.swift
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: land.deno.orchid.capture
        INFOPLIST_FILE: SupportingFiles/AppInfo.plist
        CODE_SIGN_ENTITLEMENTS: SupportingFiles/OrchidCapture.entitlements
