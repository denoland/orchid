name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build dashboard SPA
        working-directory: www
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Build orch binaries
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
              go build -trimpath -ldflags="-s -w" \
              -o "dist/orch-linux-$arch/orch" ./cmd/orch
            tar -czf "dist/orch-linux-$arch.tar.gz" -C "dist/orch-linux-$arch" orch
          done
          ls -lh dist/

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/orch-linux-amd64.tar.gz \
            dist/orch-linux-arm64.tar.gz
